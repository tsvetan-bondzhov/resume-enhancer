services:
  grafana-lgtm:
    image: 'grafana/otel-lgtm:latest'
    ports:
      - '3000:3000'
      - '4317:4317'
      - '4318:4318'
    volumes:
      - './grafana/provisioning/dashboards/dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/dashboards.yaml:ro'
      - './grafana/provisioning/dashboards/resume-enhancer.json:/otel-lgtm/grafana/conf/provisioning/dashboards/resume-enhancer.json:ro'
  ollama:
    image: 'ollama/ollama:latest'
    ports:
      - '11434:11434'
  postgres:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=resumeenhancer'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432:5432'
  app:
    image: 'resume-enhancer:latest'
    build:
      context: .
    ports:
      - '8080:8080'
    environment:
      - 'SPRING_PROFILES_ACTIVE=prod'
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/resumeenhancer'
      - 'SPRING_DATASOURCE_USERNAME=myuser'
      - 'SPRING_DATASOURCE_PASSWORD=secret'
      - 'SPRING_AI_OLLAMA_BASE_URL=http://ollama:11434'
    depends_on:
      - postgres
      - ollama
    profiles:
      - production
