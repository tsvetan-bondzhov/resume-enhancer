spring:
  application:
    name: resume-enhancer
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/resumeenhancer
    username: myuser
    password: secret
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  ai:
    ollama:
      base-url: http://localhost:11434
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  cache:
    type: caffeine
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
    logging:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/logs
    metrics:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/metrics
  management:
    tracing:
      sampling:
        probability: 1.0

app:
  jwt:
    # Base64-encoded secret key (min 256 bits / 32 bytes for HMAC-SHA256)
    # Override in production via environment variable APP_JWT_SECRET
    secret: "dGhpcy1pcy1hLXNlY3VyZS1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tZ2Vu"
    expiration-ms: 3600000
