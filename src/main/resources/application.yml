spring:
  application:
    name: resume-enhancer
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/resumeenhancer
    username: myuser
    password: secret
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  ai:
    ollama:
      base-url: http://localhost:11434
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 8MB
  cache:
    type: caffeine

# Observability — OpenTelemetry / OTLP export + trace sampling.
# These are ROOT-level Spring Boot 4 keys (NOT under spring:). The OTLP endpoints
# target the grafana/otel-lgtm collector exposed on :4318 (see compose.yaml).
management:
  tracing:
    sampling:
      # probability 1.0 = sample every trace for local/dev observability
      probability: 1.0
  # Spring Boot 4 OTLP export keys. Traces and logs use management.opentelemetry.*
  # (OpenTelemetry SDK exporters); metrics use management.otlp.metrics.* (Micrometer
  # OTLP registry). The previous management.otlp.tracing/logging.* keys are NOT bound
  # in Spring Boot 4 — traces only worked because the OTel SDK defaults to :4318.
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
    logging:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/logs
  otlp:
    metrics:
      export:
        url: http://localhost:4318/v1/metrics
        # Micrometer's OTLP registry defaults to MILLISECONDS, which would emit
        # http_server_requests_milliseconds_* and leave the dashboard's
        # http_server_requests_seconds_* panels empty. Force seconds to match.
        base-time-unit: seconds

app:
  jwt:
    # Base64-encoded secret key (min 256 bits / 32 bytes for HMAC-SHA256)
    # Override in production via environment variable APP_JWT_SECRET
    secret: "dGhpcy1pcy1hLXNlY3VyZS1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tZ2Vu"
    expiration-ms: 3600000
